<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B1010"/>
      <stop offset="100%" stop-color="#3D0C00"/>
    </linearGradient>
    <linearGradient id="petalA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB340"/>
      <stop offset="100%" stop-color="#C9880D"/>
    </linearGradient>
    <linearGradient id="petalB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8A030"/>
      <stop offset="100%" stop-color="#A86000"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bgG)"/>

  <!-- Outer lotus petals (8, pointing outward from center) -->
  <!-- Petal: M50 50 C42 43,41 32,50 23 C59 32,58 43,50 50 Z  (pointing up) -->
  <path d="M50 50 C42 43,41 32,50 23 C59 32,58 43,50 50Z" fill="url(#petalA)" opacity="0.92"/>
  <path d="M50 50 C42 43,41 32,50 23 C59 32,58 43,50 50Z" fill="url(#petalA)" opacity="0.92" transform="rotate(90 50 50)"/>
  <path d="M50 50 C42 43,41 32,50 23 C59 32,58 43,50 50Z" fill="url(#petalA)" opacity="0.92" transform="rotate(180 50 50)"/>
  <path d="M50 50 C42 43,41 32,50 23 C59 32,58 43,50 50Z" fill="url(#petalA)" opacity="0.92" transform="rotate(270 50 50)"/>
  <!-- Diagonal petals (lighter) -->
  <path d="M50 50 C42 43,41 32,50 23 C59 32,58 43,50 50Z" fill="url(#petalB)" opacity="0.75" transform="rotate(45 50 50)"/>
  <path d="M50 50 C42 43,41 32,50 23 C59 32,58 43,50 50Z" fill="url(#petalB)" opacity="0.75" transform="rotate(135 50 50)"/>
  <path d="M50 50 C42 43,41 32,50 23 C59 32,58 43,50 50Z" fill="url(#petalB)" opacity="0.75" transform="rotate(225 50 50)"/>
  <path d="M50 50 C42 43,41 32,50 23 C59 32,58 43,50 50Z" fill="url(#petalB)" opacity="0.75" transform="rotate(315 50 50)"/>

  <!-- Center circle -->
  <circle cx="50" cy="50" r="17" fill="#8B1A1A"/>
  <circle cx="50" cy="50" r="15" fill="#6B1010"/>

  <!-- Om symbol -->
  <text x="50" y="56" text-anchor="middle" font-size="18" fill="#FFD700" font-family="serif" font-weight="bold">ॐ</text>

  <!-- Thin gold ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#FFD700" stroke-width="1.2" opacity="0.7"/>
</svg>
